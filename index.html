<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitchyard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glitch {
            position: relative;
            width: 200px;
            height: 200px;
        }

        .glitch img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch img:nth-child(1) {
            z-index: 3;
            animation: glitch-main 5s infinite;
        }

        .glitch img:nth-child(2) {
            z-index: 2;
            opacity: 0;
            animation: glitch-red 5s infinite;
            filter: drop-shadow(2px 0 0 rgba(255, 0, 50, 0.8));
        }

        .glitch img:nth-child(3) {
            z-index: 1;
            opacity: 0;
            animation: glitch-blue 5s infinite;
            filter: drop-shadow(-2px 0 0 rgba(0, 200, 255, 0.8));
        }

        @keyframes glitch-main {
            0%, 89%, 100% { transform: translate(0); }
            90% { transform: translate(-3px, 1px); }
            91% { transform: translate(2px, -1px); }
            92% { transform: translate(0); clip-path: inset(30% 0 40% 0); }
            93% { transform: translate(-4px, 2px); clip-path: inset(60% 0 10% 0); }
            94% { transform: translate(3px, 0); clip-path: inset(10% 0 70% 0); }
            95% { transform: translate(0); clip-path: inset(0); }
            96% { transform: translate(2px, -2px); clip-path: inset(45% 0 25% 0); }
            97% { transform: translate(-1px, 1px); }
            98% { transform: translate(0); }
        }

        @keyframes glitch-red {
            0%, 89%, 98%, 100% { opacity: 0; transform: translate(0); }
            90% { opacity: 1; transform: translate(4px, -1px); clip-path: inset(20% 0 50% 0); }
            91% { opacity: 1; transform: translate(-3px, 2px); clip-path: inset(55% 0 15% 0); }
            92% { opacity: 0; }
            93% { opacity: 1; transform: translate(5px, 0); clip-path: inset(40% 0 30% 0); }
            94% { opacity: 1; transform: translate(-2px, -1px); clip-path: inset(10% 0 65% 0); }
            95% { opacity: 0; }
            96% { opacity: 1; transform: translate(3px, 1px); clip-path: inset(70% 0 5% 0); }
            97% { opacity: 0; }
        }

        @keyframes glitch-blue {
            0%, 90%, 98%, 100% { opacity: 0; transform: translate(0); }
            91% { opacity: 1; transform: translate(-4px, 1px); clip-path: inset(15% 0 55% 0); }
            92% { opacity: 1; transform: translate(3px, -2px); clip-path: inset(50% 0 20% 0); }
            93% { opacity: 0; }
            94% { opacity: 1; transform: translate(-5px, 1px); clip-path: inset(35% 0 35% 0); }
            95% { opacity: 1; transform: translate(2px, 0); clip-path: inset(65% 0 10% 0); }
            96% { opacity: 0; }
            97% { opacity: 1; transform: translate(-3px, -1px); clip-path: inset(25% 0 45% 0); }
        }
    </style>
</head>
<body>
    <div class="glitch">
        <img src="gy-logo.png" alt="Glitchyard">
        <img src="gy-logo.png" alt="" aria-hidden="true">
        <img src="gy-logo.png" alt="" aria-hidden="true">
    </div>
</body>
</html>
